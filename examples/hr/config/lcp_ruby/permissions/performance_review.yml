permissions:
  model: performance_review

  roles:
    admin:
      crud: [index, show, create, update, destroy]
      fields: { readable: all, writable: all }
      actions: all
      scope: all
      presenters: all

    hr_manager:
      crud: [index, show, create, update, destroy]
      fields: { readable: all, writable: all }
      actions: all
      scope: all
      presenters: all

    manager:
      crud: [index, show, create, update]
      fields:
        readable: all
        writable: [manager_rating, manager_comments, overall_rating, strengths, improvements, status]
      actions: { allowed: [] }
      scope:
        type: association
        field: employee.organization_unit_id
        user_field: organization_unit_id
      presenters: all

    employee:
      crud: [index, show, update]
      fields:
        readable: all
        writable: [self_rating, self_comments]
      actions: { allowed: [] }
      scope:
        type: field_match
        field: employee_id
        user_field: employee_id
      presenters: all

  default_role: employee

  record_rules:
    - name: completed_readonly
      condition: { field: status, operator: in, value: [completed, acknowledged] }
      effect:
        deny_crud: [update]
        except_roles: [admin]
