permissions:
  model: saved_filter

  roles:
    admin:
      crud: [index, show, create, update, destroy]
      fields: { readable: all, writable: all }
      actions: all
      scope: all
      presenters: all
    sales_rep:
      crud: [index, show, create, update, destroy]
      fields: { readable: all, writable: all }
      actions: all
      scope: all
      record_rules:
        - deny: [update, delete]
          when:
            visibility: { not_eq: personal }
            owner_id: { not_eq: "{current_user.id}" }
    viewer:
      crud: [index, show]
      fields: { readable: all, writable: [] }
      actions: { allowed: [] }
      scope: all

  default_role: viewer
