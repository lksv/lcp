permissions:
  model: deal

  roles:
    admin:
      crud: [index, show, create, update, destroy, restore, permanently_destroy]
      fields: { readable: all, writable: all }
      actions: all
      scope: all
      presenters: all

    sales_rep:
      crud: [index, show, create, update, destroy]
      fields:
        readable: all
        writable: [title, stage, tags, company_id, contact_id]
      actions:
        allowed: [close_won]
        denied: []
      scope: all
      presenters: [deal]

    viewer:
      crud: [index, show]
      fields: { readable: [title, stage, value, tags], writable: [] }
      actions: { allowed: [] }
      scope: all
      presenters: [deal_pipeline]

  default_role: viewer

  field_overrides:
    value:
      writable_by: [admin]
      readable_by: [admin, sales_rep]

  record_rules:
    # Simple rule: closed deals are read-only
    - name: closed_deals_readonly
      condition: { field: stage, operator: in, value: [closed_won, closed_lost] }
      effect:
        deny_crud: [update, destroy]
        except_roles: [admin]

    # Compound condition (all) + dynamic value reference (field_ref):
    # High-value deals in negotiation require admin approval to modify
    - name: high_value_negotiation_locked
      condition:
        all:
          - { field: stage, operator: eq, value: negotiation }
          - { field: value, operator: gt, value: 50000 }
      effect:
        deny_crud: [update, destroy]
        except_roles: [admin]
