permissions:
  model: showcase_condition

  roles:
    admin:
      crud: [index, show, create, update, destroy]
      fields: { readable: all, writable: all }
      actions: { allowed: [approve] }
      presenters: all
      scope: all
    editor:
      crud: [index, show, create, update]
      fields:
        readable: all
        writable: [title, status, priority, amount, budget_limit, due_date, code, description, showcase_condition_category_id]
      actions: { allowed: [approve] }
      presenters: all
      scope: all
    viewer:
      crud: [index, show]
      fields: { readable: all, writable: [] }
      actions: { allowed: [] }
      presenters: all
      scope: all
    owner:
      crud: [index, show, create, update, destroy]
      fields: { readable: all, writable: all }
      actions: { allowed: [approve] }
      presenters: all
      scope: all

  record_rules:
    # COMPOUND record rule: lock editing on high-value closed records
    - name: high_value_closed_locked
      condition:
        all:
          - { field: status, operator: eq, value: closed }
          - { field: amount, operator: gt, value: 10000 }
      effect:
        deny_crud: [update, destroy]
        except_roles: [admin]

    # CURRENT_USER record rule: only the author can destroy
    - name: owner_only_destroy
      condition:
        not:
          field: author_id
          operator: eq
          value: { current_user: id }
      effect:
        deny_crud: [destroy]
        except_roles: [admin]

  default_role: editor
