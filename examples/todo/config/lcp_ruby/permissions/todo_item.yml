permissions:
  model: todo_item

  roles:
    admin:
      crud: [index, show, create, update, destroy]
      fields: { readable: all, writable: all }
      actions: all
      scope: all
      presenters: all

  default_role: admin

  record_rules:
    # Completed overdue items are locked — prevents accidental edits
    # Uses compound condition (all) + dynamic date reference (date: today)
    - name: completed_overdue_locked
      condition:
        all:
          - { field: completed, operator: eq, value: true }
          - { field: due_date, operator: lt, value: { date: today } }
      effect:
        deny_crud: [update, destroy]
