# Keep in sync with lib/generators/lcp_ruby/templates/custom_fields/presenter.yml
presenter:
  name: custom_fields
  model: custom_field_definition
  label: "Custom Fields"
  slug: custom-fields

  index:
    default_sort: { field: position, direction: asc }
    empty_message: "No custom fields defined yet."
    table_columns:
      - { field: field_name, label: "Field Name", sortable: true }
      - { field: custom_type, label: "Type", sortable: true }
      - { field: label, label: "Label", sortable: true }
      - { field: section, label: "Section" }
      - { field: position, label: "Position", sortable: true }
      - { field: active, label: "Active", renderer: boolean }
      - { field: required, label: "Required", renderer: boolean }

  show:
    layout:
      - section: "General"
        columns: 2
        fields:
          - { field: field_name }
          - { field: custom_type }
          - { field: label }
          - { field: section }
          - { field: position }
          - { field: active }
          - { field: required }
          - { field: description, col_span: 2 }
      - section: "Default & Placeholder"
        columns: 2
        fields:
          - { field: default_value }
          - field: placeholder
            visible_when: { field: custom_type, operator: in, value: [string, text] }
          - { field: hint }
      - section: "Text Constraints"
        columns: 2
        visible_when: { field: custom_type, operator: in, value: [string, text] }
        fields:
          - { field: min_length }
          - { field: max_length }
      - section: "Numeric Constraints"
        columns: 2
        visible_when: { field: custom_type, operator: in, value: [integer, float, decimal] }
        fields:
          - { field: min_value }
          - { field: max_value }
          - field: precision
            visible_when: { field: custom_type, operator: eq, value: decimal }
      - section: "Enum Values"
        visible_when: { field: custom_type, operator: eq, value: enum }
        fields:
          - { field: enum_values }
      - section: "Display Options"
        columns: 2
        fields:
          - { field: show_in_table }
          - { field: show_in_form }
          - { field: show_in_show }
          - { field: sortable }
          - field: searchable
            visible_when: { field: custom_type, operator: in, value: [string, text, enum] }
          - { field: input_type }
          - { field: renderer }
          - { field: column_width }

  form:
    layout: sections
    sections:
      - title: "General"
        columns: 2
        fields:
          - { field: field_name }
          - { field: custom_type }
          - { field: label }
          - { field: section }
          - { field: position }
          - { field: active }
          - { field: required }
          - { field: description, col_span: 2 }
      - title: "Default & Placeholder"
        columns: 2
        fields:
          - { field: default_value }
          - field: placeholder
            visible_when: { field: custom_type, operator: in, value: [string, text] }
          - { field: hint }
      - title: "Text Constraints"
        columns: 2
        visible_when: { field: custom_type, operator: in, value: [string, text] }
        fields:
          - { field: min_length }
          - { field: max_length }
      - title: "Numeric Constraints"
        columns: 2
        visible_when: { field: custom_type, operator: in, value: [integer, float, decimal] }
        fields:
          - { field: min_value }
          - { field: max_value }
          - field: precision
            visible_when: { field: custom_type, operator: eq, value: decimal }
      - title: "Enum Values"
        visible_when: { field: custom_type, operator: eq, value: enum }
        fields:
          - { field: enum_values }
      - title: "Display Options"
        columns: 2
        fields:
          - { field: show_in_table }
          - { field: show_in_form }
          - { field: show_in_show }
          - { field: sortable }
          - field: searchable
            visible_when: { field: custom_type, operator: in, value: [string, text, enum] }
          - { field: input_type }
          - { field: renderer }
          - { field: column_width }

  search:
    enabled: true
    searchable_fields: [field_name, label, section]

  actions:
    collection:
      - { name: create, type: built_in, label: "New Field" }
    single:
      - { name: show, type: built_in }
      - { name: edit, type: built_in }
      - { name: destroy, type: built_in, confirm: "Are you sure?" }
