presenter:
  name: product
  model: product
  slug: products
  label: "Products"

  search:
    enabled: true
    searchable_fields: [name]
    placeholder: "Search products..."

    predefined_filters:
      - { name: all, label: "All", default: true }
      - { name: active, label: "Active", scope: active_products }

    advanced_filter:
      enabled: true
      max_conditions: 10
      default_combinator: and
      filterable_fields:
        - name
        - price
        - quantity
        - active
        - status
        - release_date

  index:
    table_columns:
      - { field: name, sortable: true, link_to: show }
      - { field: price, sortable: true }
      - { field: quantity, sortable: true }
      - { field: status, sortable: true }
      - { field: active }

  form:
    sections:
      - section: details
        fields:
          - { field: name }
          - { field: price }
          - { field: quantity }
          - { field: active }
          - { field: status }
          - { field: release_date }

  show:
    sections:
      - section: details
        fields:
          - { field: name }
          - { field: price }
          - { field: quantity }
          - { field: active }
          - { field: status }
          - { field: release_date }

  actions:
    collection:
      - { name: create, type: built_in }
    single:
      - { name: show, type: built_in }
      - { name: edit, type: built_in }
      - { name: destroy, type: built_in }
