permissions:
  model: filtered_task

  roles:
    admin:
      crud: [index, show, create, update, destroy]
      fields: { readable: all, writable: all }
      actions: all
      scope: all
      presenters: all

    user:
      crud: [index, show]
      fields: { readable: all, writable: [] }
      actions: []
      scope: all
      presenters: all

  default_role: user
