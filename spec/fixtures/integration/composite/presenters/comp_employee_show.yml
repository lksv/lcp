      - { field: department }
      - { field: status }

  show:
    layout:
      - section: Details
        fields:
          - { field: name }
          - { field: email }
          - { field: department }
          - { field: status }

  form:
    sections:
      - title: Details
        fields:
          - { field: name }
          - { field: email }
          - { field: department }
          - { field: status }

  actions:
    collection:
      - { name: create, type: built_in }
    single:
      - { name: show, type: built_in }
      - { name: edit, type: built_in }
      - { name: destroy, type: built_in }
