permissions:
  model: comp_employee
  roles:
    admin:
      crud: [index, show, create, update, destroy]
      presenters: all
      fields:
        readable: all
        writable: all
    viewer:
      crud: [index, show]
      presenters: [comp_employee_show]
      fields:
        readable: all
    restricted:
      crud: [index, show]
      presenters: [comp_employee_show]
      fields:
        readable: all
