permissions:
  model: category

  roles:
    admin:
      crud: [index, show, create, update, destroy]
      fields:
        readable: all
        writable: all
      actions: all
      scope: all
      presenters: all

    viewer:
      crud: [index, show]
      fields:
        readable: [name]
        writable: []
      scope: all
      presenters: [category]
