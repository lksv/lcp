presenter:
  name: article_default
  model: article
  label: "Articles (Default Search)"
  slug: articles-default

  index:
    default_view: table
    table_columns:
      - { field: title, link_to: show }
      - { field: status }

  show:
    layout:
      - section: "Details"
        fields:
          - { field: title }
          - { field: body }
          - { field: status }

  form:
    sections:
      - title: "Details"
        fields:
          - { field: title }
          - { field: body }
          - { field: status }

  search:
    enabled: true
    searchable_fields: [title]

  actions:
    collection:
      - { name: create, type: built_in }
    single:
      - { name: show, type: built_in }
      - { name: edit, type: built_in }
      - { name: destroy, type: built_in, confirm: true }
