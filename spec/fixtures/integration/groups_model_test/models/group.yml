model:
  name: group
  label: "Group"
  label_plural: "Groups"

  fields:
    - name: name
      type: string
      label: "Name"
      transforms: [strip]
      validations:
        - type: presence
        - type: uniqueness

    - name: label
      type: string
      label: "Label"

    - name: description
      type: text
      label: "Description"

    - name: active
      type: boolean
      label: "Active"
      default: true

  options:
    timestamps: true
    label_method: label
