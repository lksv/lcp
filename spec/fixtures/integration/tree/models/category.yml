model:
  name: category
  label: "Category"
  label_plural: "Categories"

  fields:
    - name: name
      type: string
      label: "Name"
      column_options:
        limit: 255
        "null": false
      validations:
        - type: presence

    - name: parent_id
      type: integer
      label: "Parent"

    - name: active
      type: boolean
      label: "Active"

  options:
    timestamps: true
    label_method: name
    tree: true
