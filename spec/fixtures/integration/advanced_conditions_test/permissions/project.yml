permissions:
  model: project

  roles:
    admin:
      crud: [index, show, create, update, destroy]
      fields: { readable: all, writable: all }
      actions: all
      scope: all
      presenters: all

    editor:
      crud: [index, show, create, update]
      fields: { readable: all, writable: [name, status, industry] }
      actions: { allowed: [] }
      scope: all
      presenters: all

  default_role: editor
