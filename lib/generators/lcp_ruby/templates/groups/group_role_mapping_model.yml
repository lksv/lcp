model:
  name: group_role_mapping
  label: "Group Role Mapping"
  label_plural: "Group Role Mappings"

  fields:
    - name: role_name
      type: string
      label: "Role Name"
      limit: 50
      null: false
      validations:
        - type: presence
        - type: uniqueness
          fields: [group_id, role_name]

  associations:
    - name: group
      type: belongs_to
      target_model: group

  options:
    timestamps: true
